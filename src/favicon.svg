<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#06060f"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff5c0" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ffd700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff4500" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sun" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fffde7"/>
      <stop offset="45%" stop-color="#ffc107"/>
      <stop offset="100%" stop-color="#e65100"/>
    </radialGradient>
    <radialGradient id="earth" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#b3e5fc"/>
      <stop offset="50%" stop-color="#0288d1"/>
      <stop offset="100%" stop-color="#01579b"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" ry="6" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="3.5" cy="4.5"  r="0.6" fill="white" opacity="0.8"/>
  <circle cx="26"  cy="3.5"  r="0.5" fill="white" opacity="0.7"/>
  <circle cx="29"  cy="9"    r="0.5" fill="white" opacity="0.6"/>
  <circle cx="4"   cy="27"   r="0.5" fill="white" opacity="0.7"/>
  <circle cx="28"  cy="25"   r="0.6" fill="white" opacity="0.8"/>
  <circle cx="2"   cy="16"   r="0.4" fill="white" opacity="0.5"/>

  <!-- Orbital ring -->
  <ellipse cx="16" cy="16" rx="11.5" ry="3.8"
    fill="none"
    stroke="rgba(255,255,255,0.2)"
    stroke-width="0.6"
    stroke-dasharray="2.5 1.5"
    transform="rotate(-25, 16, 16)"/>

  <!-- Sun glow -->
  <circle cx="16" cy="16" r="7.5" fill="url(#sunGlow)"/>

  <!-- Sun -->
  <circle cx="16" cy="16" r="5.3" fill="url(#sun)"/>

  <!-- Planet -->
  <circle cx="24.8" cy="12.5" r="2.4" fill="url(#earth)"/>
  <!-- Continent -->
  <circle cx="24.1" cy="12"   r="0.8" fill="#2e7d32" opacity="0.75"/>
  <!-- Atmosphere -->
  <circle cx="24.8" cy="12.5" r="2.4" fill="none" stroke="#81d4fa" stroke-width="0.5" opacity="0.4"/>
</svg>
