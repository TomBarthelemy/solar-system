<canvas #canvas class="webgl"></canvas>

<div class="loading-bar"></div>

<div class="drag-hint" [class.hidden]="!!selectedPlanet" [class.vertical]="isMobileLayout">
  <div class="drag-hint-inner">
    <svg class="drag-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path *ngIf="!isMobileLayout" d="M19 12H5M5 12l7-7M5 12l7 7"/>
      <path *ngIf="isMobileLayout"  d="M12 19V5M5 12l7-7 7 7"/>
    </svg>
    <span>{{ isMobileLayout ? 'Faire défiler' : 'Glisser pour explorer' }}</span>
    <svg class="drag-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path *ngIf="!isMobileLayout" d="M5 12h14M14 5l7 7-7 7"/>
      <path *ngIf="isMobileLayout"  d="M12 5v14M19 12l-7 7-7-7"/>
    </svg>
  </div>
</div>

<div class="rotate-hint" [class.hidden]="!selectedPlanet || planetDragUsed">
  <div class="rotate-hint-inner">
    <svg class="rotate-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
      <polyline points="3 3 3 8 8 8"/>
    </svg>
    <span>Faire pivoter</span>
  </div>
</div>

<app-planet-card
  *ngIf="selectedPlanet"
  [planet]="selectedPlanet"
  [planetOrder]="planetOrder"
  [accentColor]="selectedPlanetColor"
  (closed)="unfocusPlanet()"
  (navigated)="navigatePlanet($event)">
</app-planet-card>
