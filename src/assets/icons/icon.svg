<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#06060f"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff5c0" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#ffd700" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff4500" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sun" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fffde7"/>
      <stop offset="40%" stop-color="#ffc107"/>
      <stop offset="100%" stop-color="#e65100"/>
    </radialGradient>
    <radialGradient id="earth" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#b3e5fc"/>
      <stop offset="45%" stop-color="#0288d1"/>
      <stop offset="100%" stop-color="#01579b"/>
    </radialGradient>
    <filter id="sunBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="planetBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="55"  cy="75"  r="2.5" fill="white" opacity="0.8"/>
  <circle cx="130" cy="28"  r="1.8" fill="white" opacity="0.6"/>
  <circle cx="390" cy="55"  r="2.2" fill="white" opacity="0.9"/>
  <circle cx="460" cy="140" r="1.8" fill="white" opacity="0.7"/>
  <circle cx="75"  cy="430" r="2.0" fill="white" opacity="0.6"/>
  <circle cx="445" cy="400" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="28"  cy="260" r="1.8" fill="white" opacity="0.5"/>
  <circle cx="485" cy="285" r="2.0" fill="white" opacity="0.8"/>
  <circle cx="210" cy="45"  r="1.2" fill="white" opacity="0.9"/>
  <circle cx="355" cy="475" r="1.8" fill="white" opacity="0.6"/>
  <circle cx="155" cy="468" r="2.0" fill="white" opacity="0.7"/>
  <circle cx="470" cy="60"  r="1.5" fill="white" opacity="0.5"/>
  <circle cx="40"  cy="160" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="320" cy="30"  r="1.0" fill="white" opacity="0.8"/>

  <!-- Orbital ring (tilted ellipse) -->
  <ellipse cx="256" cy="256" rx="180" ry="60"
    fill="none"
    stroke="rgba(255,255,255,0.18)"
    stroke-width="2"
    stroke-dasharray="12 6"
    transform="rotate(-25, 256, 256)"/>

  <!-- Sun glow halo -->
  <circle cx="256" cy="256" r="115" fill="url(#sunGlow)"/>

  <!-- Sun -->
  <circle cx="256" cy="256" r="82" fill="url(#sun)" filter="url(#sunBlur)"/>

  <!-- Sun surface spots (subtle) -->
  <circle cx="230" cy="240" r="14" fill="#e65100" opacity="0.25"/>
  <circle cx="278" cy="272" r="9"  fill="#e65100" opacity="0.20"/>
  <circle cx="260" cy="225" r="7"  fill="#bf360c" opacity="0.15"/>

  <!-- Earth-like planet on the orbit -->
  <!-- Position at ~45° on the tilted ellipse -->
  <circle cx="393" cy="202" r="34" fill="url(#earth)" filter="url(#planetBlur)"/>
  <!-- Green continents -->
  <ellipse cx="385" cy="196" rx="10" ry="7"  fill="#2e7d32" opacity="0.7" transform="rotate(-15,385,196)"/>
  <circle  cx="402" cy="212" r="6"            fill="#388e3c" opacity="0.6"/>
  <ellipse cx="390" cy="218" rx="5"  ry="3"  fill="#1b5e20" opacity="0.5" transform="rotate(10,390,218)"/>
  <!-- Atmosphere rim -->
  <circle cx="393" cy="202" r="34" fill="none" stroke="#81d4fa" stroke-width="3" opacity="0.35"/>
</svg>
